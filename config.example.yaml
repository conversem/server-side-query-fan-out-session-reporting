# Configuration Template for LLM Bot Traffic Pipeline
#
# Setup:
# 1. Copy this to config.yaml and fill in your values
# 2. Encrypt with SOPS:
#    sops -e config.yaml > config.enc.yaml
#    rm config.yaml
#
# 3. To edit encrypted file:
#    sops config.enc.yaml
#
# See docs/sops/quickstart.md for detailed instructions.

# =============================================================================
# Storage Backend
# =============================================================================
storage:
  backend: "sqlite"                    # "sqlite" or "bigquery"
  sqlite_db_path: "data/llm-bot-logs.db"

# =============================================================================
# Cloudflare Configuration (for Logpull/Logpush API)
# =============================================================================
cloudflare:
  api_token: "your-cloudflare-api-token"  # SENSITIVE — Cloudflare dashboard > API Tokens
  zone_id: "your-zone-id"                 # SENSITIVE — Dashboard > Overview > Zone ID
  logpush_job_name: "llm-bot-logpush"
  logpush_enabled: true

# =============================================================================
# Multi-Domain Configuration (optional)
# =============================================================================
# Use with scripts/run_multi_domain.py for multiple Cloudflare zones.
# Each domain needs a zone_id, db_name, and sitemap list.
domains:
  - domain: "example.com"
    zone_id: "your-zone-id-1"
    db_name: "example.db"
    sitemaps:
      - "https://example.com/sitemap.xml"
  # - domain: "another-domain.com"
  #   zone_id: "your-zone-id-2"
  #   db_name: "another-domain.db"
  #   sitemaps:
  #     - "https://another-domain.com/sitemap.xml"

# =============================================================================
# GCP Settings (for BigQuery backend and Cloud Run deployment)
# =============================================================================
gcp:
  project_id: "your-gcp-project-id"
  location: "EU"                          # BigQuery dataset location
  service_account_key_path: "credentials/bigquery_key.json"

# =============================================================================
# BigQuery Dataset Names (only used when backend = "bigquery")
# =============================================================================
bigquery:
  dataset_raw: "bot_logs_raw"             # Raw ingested data
  dataset_staging: "bot_logs_staging"     # Intermediate processing
  dataset_report: "bot_logs"              # Clean reporting tables

# =============================================================================
# Azure CDN Configuration (placeholder for Azure CDN ingestion)
# =============================================================================
# azure:
#   subscription_id: "your-subscription-id"
#   resource_group: "your-resource-group"
#   profile_name: "your-cdn-profile"

# =============================================================================
# Sitemap Settings
# =============================================================================
sitemap:
  enabled: true
  urls:
    - "https://www.example.com/sitemap.xml"
  cache_in_backend: true

# =============================================================================
# Session Refinement (Collision Detection & Semantic Splitting)
# =============================================================================
# Controls how overlapping request bundles are detected and split for
# improved session purity. See docs/ for research background.
session_refinement:
  enabled: true

  # Refinement strategies
  enable_semantic_refinement: true        # URL similarity splitting (recommended)
  enable_ip_based_refinement: false       # Research: IP does not discriminate collisions (r=0.023)

  splitting_strategy: "mibcs_only"        # mibcs_only, semantic, or combined

  # Collision detection thresholds
  collision_ip_threshold: 2               # Min unique IPs to flag as collision
  collision_homogeneity_threshold: 0.5    # IP homogeneity below this flags collision

  # Semantic splitting parameters
  similarity_threshold: 0.5              # Min URL similarity to create graph edge
  min_sub_bundle_size: 2                 # Min requests per sub-bundle after split
  min_mibcs_improvement: 0.05            # Min MIBCS improvement to accept split

  # Logging and metrics
  log_refinement_details: true
  collect_refinement_metrics: true

# =============================================================================
# URL Filtering (Resource Type Classification)
# =============================================================================
# Controls which URLs are kept or dropped before data reaches storage.
# Non-user-facing assets (JS, CSS, fonts) are dropped to keep reporting clean
# and reduce storage costs. Customize for your website's asset structure.
#
# How it works:
# 1. Extension-based filtering runs first (drop_extensions, image_extensions)
# 2. Path-prefix filtering catches extensionless asset paths (drop_path_prefixes)
# 3. Everything else is classified as "document" (kept)
#
# To disable filtering entirely: set enabled: false
url_filtering:
  enabled: true

  # File extensions to DROP (non-user-facing, never stored)
  # These are technical assets that bots may request but have no analytical value
  drop_extensions:
    - js       # JavaScript
    - mjs      # ES modules
    - css      # Stylesheets
    - map      # Source maps
    - woff     # Web fonts
    - woff2
    - ttf
    - eot
    - otf
    - ico      # Favicons

  # File extensions classified as "image" (stored with resource_type = "image")
  # Images are kept but can be filtered in reporting views if needed
  image_extensions:
    - jpg
    - jpeg
    - png
    - gif
    - svg
    - webp
    - avif
    - bmp

  # URL path prefixes to DROP (customize to your website's asset directories)
  # Catches asset URLs that don't have file extensions
  drop_path_prefixes:
    - /assets/js/
    - /assets/css/
    - /static/
    - /_next/
    - /chunks/
    - /vendor/
    - /node_modules/
    - /__/


name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint dependencies
        run: pip install black>=24.0.0 isort>=5.13.0

      - name: Check formatting (black)
        run: black --check src/ scripts/ tests/

      - name: Check import ordering (isort)
        run: isort --check-only src/ scripts/ tests/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,ml]"

      - name: Run tests (excluding BigQuery)
        run: |
          pytest tests/ -v \
            --ignore=tests/integration/test_bigquery_backend.py \
            -m "not bigquery" \
            --cov=llm_bot_pipeline \
            --cov-report=term-missing \
            --cov-fail-under=60

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e . bandit pip-audit

      - name: Run bandit (static security analysis)
        run: bandit -r src/ -ll --skip B104,B105,B110,B311,B404,B405,B603,B607,B608
        continue-on-error: true

      - name: Run pip-audit (dependency vulnerability check)
        run: pip-audit -r requirements.txt
        continue-on-error: true
